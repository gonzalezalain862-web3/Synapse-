<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="80" height="80">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="30" fill="#0a0f28" stroke="url(#neonGrad)" stroke-width="4" filter="url(#neonGlow)" />
  <text x="100" y="55" font-size="18" text-anchor="middle" fill="#d4af37" font-family="Arial" font-weight="bold" filter="url(#neonGlow)">INTEGRATION</text>
  <text x="100" y="105" font-size="28" text-anchor="middle" fill="url(#neonGrad)" font-family="Arial" font-weight="bold" filter="url(#neonGlow)">AI CORE</text>
  <text x="100" y="145" font-size="14" text-anchor="middle" fill="#a5b4fc" font-family="Arial" font-weight="bold">24/7 AVAILABILITY</text>
  <line x1="40" y1="165" x2="160" y2="165" stroke="#d4af37" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>
